name: Windows build

on:
  push:
    branches:
      - "**"
    tags:
      - "v*"
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows ZIP
    runs-on: windows-latest

    env:
      BUILD_TYPE: Release
      VCPKG_DEFAULT_TRIPLET: x64-windows

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install raylib
        shell: pwsh
        run: |
          & "$env:VCPKG_INSTALLATION_ROOT\vcpkg.exe" install raylib:x64-windows

      - name: Install raygui header
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path external\raygui | Out-Null
          Invoke-WebRequest `
            -Uri "https://raw.githubusercontent.com/raysan5/raygui/4.0/src/raygui.h" `
            -OutFile "external\raygui\raygui.h"

      - name: Configure
        shell: pwsh
        run: |
          cmake -S . -B build `
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} `
            -DBUILD_TESTING=ON `
            -Draygui_INCLUDE_DIR="$PWD\external\raygui" `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT\scripts\buildsystems\vcpkg.cmake" `
            -DVCPKG_TARGET_TRIPLET=${{ env.VCPKG_DEFAULT_TRIPLET }} `
            -DVCPKG_APPLOCAL_DEPS=ON

      - name: Build
        shell: pwsh
        run: |
          cmake --build build --config ${{ env.BUILD_TYPE }} --parallel

      - name: Run command/session tests
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path test-results | Out-Null
          $testExe = "build\tests\${{ env.BUILD_TYPE }}\rts_tests.exe"
          & $testExe --gtest_filter=GameCommandTests.* --gtest_output=xml:test-results\gtest-command-session.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/*.xml
          if-no-files-found: warn

      - name: Package
        shell: pwsh
        run: |
          $dist = "dist\rts-windows-x64"
          New-Item -ItemType Directory -Force -Path $dist | Out-Null
          Copy-Item "build\${{ env.BUILD_TYPE }}\rts.exe" $dist
          if (Test-Path "build\${{ env.BUILD_TYPE }}\*.dll") {
            Copy-Item "build\${{ env.BUILD_TYPE }}\*.dll" $dist
          }
          Copy-Item "assets" "$dist\assets" -Recurse
          New-Item -ItemType Directory -Force -Path "$dist\saves" | Out-Null
          Compress-Archive -Path "$dist\*" -DestinationPath "dist\rts-windows-x64.zip" -Force

      - name: Upload ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: rts-windows-x64
          path: dist/rts-windows-x64.zip
          if-no-files-found: error

      - name: Resolve release version
        id: release_version
        if: github.event_name == 'push'
        shell: pwsh
        run: |
          $shouldRelease = "false"
          $tagName = ""

          if ("${{ github.ref }}".StartsWith("refs/tags/v")) {
            $shouldRelease = "true"
            $tagName = "${{ github.ref_name }}"
          } elseif ("${{ github.ref }}" -eq "refs/heads/main" -or "${{ github.ref }}" -eq "refs/heads/master") {
            git fetch --tags --force
            $latestTag = git tag --list "v[0-9]*.[0-9]*.[0-9]*" --sort=-v:refname | Select-Object -First 1

            if ([string]::IsNullOrWhiteSpace($latestTag)) {
              $tagName = "v0.1.0"
            } else {
              $match = [regex]::Match($latestTag, '^v(\d+)\.(\d+)\.(\d+)$')
              if (-not $match.Success) {
                throw "Latest version tag has invalid format: $latestTag"
              }

              $major = [int]$match.Groups[1].Value
              $minor = [int]$match.Groups[2].Value
              $patch = [int]$match.Groups[3].Value + 1
              $tagName = "v$major.$minor.$patch"
            }

            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag -a $tagName -m "Release $tagName"
            git push origin $tagName
            $shouldRelease = "true"
          }

          "should_release=$shouldRelease" >> $env:GITHUB_OUTPUT
          "tag_name=$tagName" >> $env:GITHUB_OUTPUT

      - name: Create GitHub Release
        if: steps.release_version.outputs.should_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_version.outputs.tag_name }}
          files: dist/rts-windows-x64.zip
          generate_release_notes: true
