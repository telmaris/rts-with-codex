name: Windows build

on:
  push:
    branches:
      - "**"
    tags:
      - "v*"
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows ZIP
    runs-on: windows-latest

    env:
      BUILD_TYPE: Release

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure
        shell: pwsh
        run: |
          cmake -S . -B build `
            -A x64 `
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} `
            -DBUILD_TESTING=ON `
            "-Draygui_INCLUDE_DIR=$PWD\deps\raygui"

      - name: Build
        shell: pwsh
        run: |
          cmake --build build --config ${{ env.BUILD_TYPE }} --parallel

      - name: Run command/session tests
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path test-results | Out-Null
          $testExe = "build\tests\${{ env.BUILD_TYPE }}\rts_tests.exe"
          & $testExe --gtest_filter=GameCommandTests.* --gtest_output=xml:test-results\gtest-command-session.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/*.xml
          if-no-files-found: warn

      - name: Package
        shell: pwsh
        run: |
          $dist = "dist\rts-windows-x64"
          New-Item -ItemType Directory -Force -Path $dist | Out-Null

          $exe = Get-ChildItem -Path build -Recurse -Filter rts.exe |
            Where-Object { (Split-Path -Leaf (Split-Path -Parent $_.FullName)) -eq "${{ env.BUILD_TYPE }}" } |
            Select-Object -First 1
          if (-not $exe) {
            $exe = Get-ChildItem -Path build -Recurse -Filter rts.exe | Select-Object -First 1
          }
          if (-not $exe) {
            Write-Host "Build tree:"
            Get-ChildItem -Path build -Recurse | Select-Object FullName, Length
            throw "rts.exe not found in build output"
          }

          Copy-Item $exe.FullName $dist

          # Copy any DLLs sitting next to the exe (with static build there are none,
          # but kept here as a safety net in case the triplet ever changes back).
          $exeDir = Split-Path -Parent $exe.FullName
          Get-ChildItem -Path $exeDir -Filter *.dll | ForEach-Object {
            Copy-Item $_.FullName $dist
          }

          Copy-Item "assets" "$dist\assets" -Recurse
          New-Item -ItemType Directory -Force -Path "$dist\saves" | Out-Null

          Write-Host "Package contents:"
          Get-ChildItem -Path $dist -Recurse | Select-Object FullName, Length

          Compress-Archive -Path "$dist\*" -DestinationPath "dist\rts-windows-x64.zip" -Force

      - name: Upload ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: rts-windows-x64
          path: dist/rts-windows-x64.zip
          if-no-files-found: error

      - name: Resolve release version
        id: release_version
        if: github.event_name == 'push'
        shell: pwsh
        run: |
          $shouldRelease = "false"
          $tagName = ""

          if ("${{ github.ref }}".StartsWith("refs/tags/v")) {
            $shouldRelease = "true"
            $tagName = "${{ github.ref_name }}"
          } elseif ("${{ github.ref }}" -eq "refs/heads/main" -or "${{ github.ref }}" -eq "refs/heads/master") {
            # VERSION file is the single source of truth. Release only when its
            # version has not been tagged yet (patch bumps come from local builds).
            $version = (Get-Content "VERSION" -Raw).Trim()
            if ($version -notmatch '^\d+\.\d+\.\d+$') {
              throw "VERSION file malformed: '$version' (expected MAJOR.MINOR.PATCH)"
            }
            $tagName = "v$version"

            git fetch --tags --force
            $existing = git tag --list $tagName
            if ([string]::IsNullOrWhiteSpace($existing)) {
              git config user.name "github-actions[bot]"
              git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
              git tag -a $tagName -m "Release $tagName"
              git push origin $tagName
              $shouldRelease = "true"
            } else {
              Write-Host "Tag $tagName already exists; building without a new release."
            }
          }

          "should_release=$shouldRelease" >> $env:GITHUB_OUTPUT
          "tag_name=$tagName" >> $env:GITHUB_OUTPUT

      - name: Create GitHub Release
        if: steps.release_version.outputs.should_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_version.outputs.tag_name }}
          files: dist/rts-windows-x64.zip
          generate_release_notes: true
